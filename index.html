<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HillBuild AI</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #dfe9f3, #ffffff);
        margin: 0;
        padding: 0;
    }

    header {
        background: #2c3e50;
        color: white;
        text-align: center;
        padding: 20px;
    }

    .container {
        width: 80%;
        margin: auto;
        margin-top: 20px;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
    }

    h2 {
        color: #2c3e50;
    }

    label {
        font-weight: bold;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        background: #27ae60;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
    }

    button:hover {
        background: #219150;
    }

    .output {
        margin-top: 20px;
        padding: 15px;
        background: #ecf0f1;
        border-radius: 10px;
    }
</style>
</head>

<body>

<header>
    <h1>🏡 HillBuild AI</h1>
    <p>AI-Assisted Residential Design for Hill Stations</p>
</header>

<div class="container">

    <h2>Enter Site Details</h2>

    <label>Slope Angle (°)</label>
    <input type="number" id="slope">

    <label>Soil Type</label>
    <select id="soil">
        <option value="clay">Clay</option>
        <option value="sandy">Sandy</option>
        <option value="rocky">Rocky</option>
    </select>

    <label>Rainfall Level</label>
    <select id="rainfall">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select>

    <label>Plot Size (sq ft)</label>
    <input type="number" id="plot">

    <button onclick="generateDesign()">Generate Design</button>

    <div class="output" id="result"></div>

</div>

<script>
function generateDesign() {
    let slope = document.getElementById("slope").value;
    let soil = document.getElementById("soil").value;
    let rainfall = document.getElementById("rainfall").value;

    let foundation = "";
    let material = "";
    let design = "";
    let risk = "";

    // Logic for slope
    if (slope > 30) {
        design = "Stilt / Stepped House";
        foundation = "Deep pile foundation";
    } else if (slope > 15) {
        design = "Stepped foundation house";
        foundation = "Reinforced concrete foundation";
    } else {
        design = "Normal structure";
        foundation = "Shallow foundation";
    }

    // Soil logic
    if (soil === "clay") {
        material = "Lightweight materials (wood, steel)";
    } else if (soil === "sandy") {
        material = "Reinforced concrete with strong base";
    } else {
        material = "Stone + concrete";
    }

    // Rainfall logic
    if (rainfall === "high") {
        risk = "High landslide risk – Provide drainage & sloped roof";
    } else if (rainfall === "medium") {
        risk = "Moderate risk – Proper water management needed";
    } else {
        risk = "Low risk";
    }

    document.getElementById("result").innerHTML = `
        <h3>🏠 Recommended Design</h3>
        <p><b>Building Type:</b> ${design}</p>
        <p><b>Foundation:</b> ${foundation}</p>
        <p><b>Material:</b> ${material}</p>
        <p><b>Risk Analysis:</b> ${risk}</p>
    `;
}
</script>

</body>
</html>
